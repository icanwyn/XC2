
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>XC Race Timing — Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f5f4;
    --surface: #ffffff;
    --surface-2: #fafaf9;
    --border: #e7e5e4;
    --border-strong: #d6d3d1;
    --text: #1c1917;
    --text-muted: #78716c;
    --text-faint: #a8a29e;
    --primary: #2563eb;
    --primary-bg: #eff6ff;
    --primary-border: #bfdbfe;
    --primary-strong: #1d4ed8;
    --warning: #b45309;
    --warning-bg: #fffbeb;
    --warning-border: #fcd34d;
    --warning-strong: #d97706;
    --success: #047857;
    --success-bg: #ecfdf5;
    --success-border: #a7f3d0;
    --danger: #b91c1c;
    --danger-bg: #fef2f2;
    --danger-border: #fecaca;
    --pink: #db2777;
    --pink-bg: #fdf2f8;
    --pink-border: #fbcfe8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  button:disabled { cursor: not-allowed; opacity: 0.5; }
  input, select, textarea { font: inherit; color: inherit; }

  .app { max-width: 460px; margin: 0 auto; min-height: 100vh; background: var(--surface); position: relative; padding-bottom: 80px; }
  @media (min-width: 480px) {
    .app { margin-top: 16px; min-height: calc(100vh - 32px); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 20px 50px -25px rgba(0,0,0,0.15); }
    body { padding: 0 16px 32px; }
  }
  .app.wide { max-width: 720px; }

  /* picker */
  .picker { padding: 32px 24px; }
  .picker h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .picker p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  .role-grid { display: grid; gap: 12px; }
  .role-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px; text-align: left; transition: all 0.15s; }
  .role-card:hover { border-color: var(--border-strong); }
  .role-card.coach { border-left: 4px solid var(--primary); }
  .role-card.timer { border-left: 4px solid var(--warning-strong); }
  .role-card.recorder { border-left: 4px solid var(--primary); }
  .role-card-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .role-card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .role-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; letter-spacing: 0.5px; text-transform: uppercase; }
  .role-tag.timer { background: var(--warning-bg); color: var(--warning); }
  .role-tag.recorder { background: var(--primary-bg); color: var(--primary); }
  .role-tag.coach { background: var(--primary-bg); color: var(--primary); }
  .picker-instructions { background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 10px; padding: 12px 14px; margin-top: 20px; font-size: 13px; color: var(--warning); line-height: 1.5; }
  .picker-instructions b { display: block; margin-bottom: 4px; font-weight: 600; }
  .picker-bottom { margin-top: 24px; display: flex; gap: 8px; }
  .picker-bottom button { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text-muted); }

  /* coach app shell */
  .shell-top { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .meet-selector { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 600; background: var(--surface); appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%2378716c' d='M6 8L0 0h12z'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
  .meet-selector-row { display: flex; gap: 6px; align-items: center; }
  .new-meet-btn { padding: 10px 14px; background: var(--primary); color: white; border-radius: 8px; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .meet-meta-row { display: flex; gap: 12px; align-items: center; margin-top: 6px; font-size: 11px; color: var(--text-muted); }
  .live-pill { font-size: 10px; font-weight: 600; color: var(--warning-strong); text-transform: uppercase; letter-spacing: 0.6px; display: inline-flex; align-items: center; gap: 5px; }
  .live-pill.idle { color: var(--text-faint); }
  .live-pill.done { color: var(--success); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warning-strong); animation: pulse 1.5s infinite; }
  .live-pill.idle .live-dot { background: var(--text-faint); animation: none; }
  .live-pill.done .live-dot { background: var(--success); animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .switch-link { font-size: 11px; color: var(--text-faint); text-decoration: underline; cursor: pointer; }

  /* main nav tabs */
  .nav-tabs { display: flex; padding: 0 18px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 89px; z-index: 9; overflow-x: auto; }
  .nav-tab { padding: 12px 14px 10px; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.1s; white-space: nowrap; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .nav-tab .tab-badge { background: var(--warning-bg); color: var(--warning); font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 999px; margin-left: 4px; }

  /* timer/recorder topbar (separate compact) */
  .topbar { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .topbar-l { min-width: 0; flex: 1; }
  .eyebrow { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .meet-name { font-weight: 600; font-size: 14px; margin-top: 2px; }
  .race-name { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .topbar-r { text-align: right; flex-shrink: 0; }
  .live-time { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 18px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }

  /* shared view container */
  .view { padding: 16px 18px; }
  .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 8px; }
  .empty-state { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }

  /* status banners */
  .status-banner { padding: 12px 14px; border-radius: 12px; margin-bottom: 16px; }
  .status-banner.info { background: var(--primary-bg); border: 1px solid var(--primary-border); }
  .status-banner.warn { background: var(--warning-bg); border: 1px solid var(--warning-border); }
  .status-banner.success { background: var(--success-bg); border: 1px solid var(--success-border); }
  .status-banner-l { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
  .status-banner-v { font-size: 14px; font-weight: 500; margin-top: 4px; }
  .status-banner.info .status-banner-l, .status-banner.info .status-banner-v { color: var(--primary); }
  .status-banner.warn .status-banner-l, .status-banner.warn .status-banner-v { color: var(--warning); }
  .status-banner.success .status-banner-l, .status-banner.success .status-banner-v { color: var(--success); }

  /* action buttons grid */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .action-btn { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; font-weight: 500; }
  .action-btn.primary { background: var(--primary-bg); color: var(--primary); border-color: var(--primary-border); }
  .action-btn.success { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
  .action-btn.warn { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
  .action-btn.danger { color: var(--danger); border-color: var(--danger-border); }

  /* school card (entries by school) */
  .school-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .school-head { padding: 12px 14px; background: var(--surface-2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .school-head-l { min-width: 0; flex: 1; }
  .school-name { font-size: 14px; font-weight: 600; }
  .school-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .school-actions { display: flex; gap: 6px; }
  .school-action-btn { background: var(--surface); color: var(--text-muted); padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; font-weight: 500; }
  .school-action-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .school-action-btn.danger:hover { color: var(--danger); border-color: var(--danger-border); }

  .athlete-row { display: grid; grid-template-columns: 50px 1fr 24px 30px 60px 24px; gap: 8px; padding: 8px 14px; align-items: center; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; }
  .athlete-row:last-child { border-bottom: none; }
  .athlete-row:hover { background: var(--surface-2); }
  .athlete-row.entered { background: var(--primary-bg); }
  .athlete-row.entered:hover { background: #dbeafe; }
  .athlete-check { width: 18px; height: 18px; border: 1.5px solid var(--border-strong); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--surface); }
  .athlete-check.checked { background: var(--primary); border-color: var(--primary); color: white; }
  .ath-bib { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 600; color: var(--text); }
  .ath-bib.empty { color: var(--text-faint); }
  .ath-name { font-weight: 500; }
  .ath-gender { font-size: 11px; color: var(--text-muted); text-align: center; font-weight: 500; }
  .ath-gender.M { color: var(--primary); }
  .ath-gender.F { color: var(--pink); }
  .ath-grade { font-size: 11px; color: var(--text-muted); text-align: center; }
  .ath-pr { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--text-muted); text-align: right; }
  .ath-del { color: var(--text-faint); font-size: 16px; padding: 0; text-align: center; }
  .ath-del:hover { color: var(--danger); }

  .add-athlete-form { padding: 10px 14px; background: var(--surface-2); display: grid; grid-template-columns: 1fr 50px 50px 70px 50px; gap: 6px; align-items: center; border-top: 1px solid var(--border); }
  .add-athlete-form input, .add-athlete-form select { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--surface); width: 100%; }
  .add-athlete-form button { padding: 7px 8px; background: var(--primary); color: white; border-radius: 6px; font-size: 12px; font-weight: 500; }

  .add-school-row { display: flex; gap: 8px; padding: 12px 14px; background: var(--surface); border: 1px dashed var(--border-strong); border-radius: 12px; margin-bottom: 16px; align-items: center; }
  .add-school-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); }
  .add-school-row button { padding: 8px 14px; background: var(--primary); color: white; border-radius: 6px; font-size: 12px; font-weight: 500; }

  /* race view */
  .clock-card { background: var(--warning-bg); border: 1.5px solid var(--warning-border); border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 16px; }
  .clock-card-l { font-size: 11px; font-weight: 600; color: var(--warning); text-transform: uppercase; letter-spacing: 0.6px; }
  .clock-card-v { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 40px; font-weight: 600; color: var(--warning); margin: 4px 0; line-height: 1; font-variant-numeric: tabular-nums; }
  .clock-card-r { font-size: 12px; color: var(--warning); }

  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat-card { background: #f1f5f9; border-radius: 10px; padding: 10px; text-align: center; }
  .stat-card.warn { background: var(--warning-bg); }
  .stat-card.success { background: var(--success-bg); }
  .stat-card.primary { background: var(--primary-bg); }
  .stat-l { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .stat-card.warn .stat-l { color: var(--warning); }
  .stat-card.success .stat-l { color: var(--success); }
  .stat-card.primary .stat-l { color: var(--primary); }
  .stat-v { font-size: 22px; font-weight: 600; margin-top: 2px; }
  .stat-card.warn .stat-v { color: var(--warning); }
  .stat-card.success .stat-v { color: var(--success); }
  .stat-card.primary .stat-v { color: var(--primary); }

  .position-table { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .position-row-d { display: grid; grid-template-columns: 32px 1fr 1fr 60px; gap: 8px; padding: 10px 12px; align-items: center; border-bottom: 1px solid var(--border); font-size: 12px; }
  .position-row-d:last-child { border-bottom: none; }
  .position-row-d.head { background: var(--surface-2); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 8px 12px; }
  .position-row-d.unmatched { background: var(--warning-bg); }
  .pos-num { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 600; }
  .col-time { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 500; font-variant-numeric: tabular-nums; }
  .col-bib { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 500; }
  .col-name { font-size: 11px; color: var(--text-muted); }
  .empty-cell { color: var(--text-faint); font-style: italic; font-size: 11px; }

  /* timer view (chute) */
  .tap-mega { background: var(--warning-strong); color: white; border-radius: 18px; padding: 80px 20px; text-align: center; margin-bottom: 16px; transition: transform 0.05s, background 0.05s; user-select: none; }
  .tap-mega:active { transform: scale(0.97); background: #92400e; }
  .tap-mega-t { font-size: 14px; font-weight: 600; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; }
  .tap-mega-v { font-size: 64px; font-weight: 700; line-height: 1; margin-top: 8px; letter-spacing: 4px; }
  .tap-mega-h { font-size: 13px; opacity: 0.85; margin-top: 12px; }
  .tap-flash { background: #d97706 !important; }
  .undo-btn { display: block; width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--text-muted); background: var(--surface); }
  .recent-section { margin-top: 16px; }
  .entry-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .entry-row:last-child { border-bottom: none; }
  .pos-pill { background: #f1f5f9; color: var(--text-muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 6px; min-width: 32px; text-align: center; flex-shrink: 0; }
  .entry-time { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 600; font-size: 14px; margin-left: auto; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .entry-name { font-size: 13px; font-weight: 500; }
  .entry-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* recorder view (chute) */
  .pending-card { background: var(--primary-bg); border: 1.5px solid var(--primary-border); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .pending-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 6px; }
  .pending-pos { font-size: 13px; color: var(--primary); font-weight: 500; }
  .pending-time { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 22px; font-weight: 600; color: var(--primary); font-variant-numeric: tabular-nums; }
  .pending-bib-display { display: flex; justify-content: center; align-items: center; min-height: 50px; margin-top: 10px; gap: 8px; }
  .bib-digit { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 36px; font-weight: 700; color: var(--primary); width: 36px; text-align: center; border-bottom: 3px solid var(--primary-border); padding-bottom: 4px; }
  .bib-digit.empty { color: var(--text-faint); }
  .resolved-name { text-align: center; font-size: 13px; color: var(--primary); margin-top: 6px; min-height: 18px; font-weight: 500; }
  .pending-empty { background: #f1f5f9; border: 1.5px dashed var(--border-strong); border-radius: 12px; padding: 30px 14px; text-align: center; margin-bottom: 14px; color: var(--text-muted); font-size: 13px; }
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .key { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 18px 0; text-align: center; font-size: 22px; font-weight: 500; transition: all 0.05s; user-select: none; }
  .key:active { background: #f1f5f9; transform: scale(0.96); }
  .key.commit { background: var(--primary); color: white; border-color: var(--primary); }
  .key.commit:disabled { background: #cbd5e1; border-color: #cbd5e1; }
  .key.del { color: var(--text-muted); }
  .drift-bar { padding: 10px 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin: 12px 0; }
  .drift-bar.synced { background: var(--success-bg); color: var(--success); }
  .drift-bar.drift { background: var(--warning-bg); color: var(--warning); }
  .drift-bar b { font-weight: 600; }
  .skip-btn { background: var(--surface); color: var(--text-muted); padding: 4px 10px; border: 1px solid var(--border-strong); border-radius: 6px; font-size: 11px; font-weight: 500; }

  /* results view */
  .results-section { margin-bottom: 24px; }
  .results-h { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; }
  .results-h-sub { font-size: 11px; color: var(--text-muted); font-weight: 400; }

  .team-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .team-row.winner { background: var(--warning-bg); border-color: var(--warning-border); }
  .team-row-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .team-place { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 600; font-size: 13px; color: var(--text-muted); margin-right: 8px; }
  .team-place.winner { color: var(--warning); }
  .team-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; }
  .team-pts { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 18px; font-weight: 700; }
  .team-row.winner .team-pts { color: var(--warning); }
  .team-places { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 6px; }
  .team-place-pill { background: #f1f5f9; padding: 2px 7px; border-radius: 999px; font-weight: 500; }
  .team-place-pill.disp { background: var(--surface); border: 1px dashed var(--border-strong); color: var(--text-faint); }
  .team-row.winner .team-place-pill { background: white; }
  .team-nts { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; opacity: 0.7; }
  .team-nts-l { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .team-nts-name { font-size: 13px; font-weight: 500; margin-top: 2px; }

  .ind-row { display: grid; grid-template-columns: 30px 50px 1fr 60px 18px; gap: 8px; padding: 7px 12px; align-items: center; border-bottom: 1px solid var(--border); font-size: 12px; background: var(--surface); }
  .ind-row:last-child { border-bottom: none; }
  .ind-pos { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 600; font-size: 12px; }
  .ind-bib { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--text-muted); font-size: 11px; }
  .ind-name { font-weight: 500; }
  .ind-school { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .ind-time { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
  .ind-pr { color: var(--warning); font-size: 14px; text-align: center; }

  .school-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .school-filter button { padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); font-size: 11px; color: var(--text-muted); }
  .school-filter button.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* share section */

<script>
//=================================================================
// SEED DATA - Updated for user's roster format (no bib in CSV, email/phone private)
//=================================================================
const SEED_SCHOOLS = ["Crystal Springs", "Pine Hills", "Riverside", "Westview", "Northgate", "Eastfield"];

// Athletes now include email and phone (private, for coach use only)
const SEED_ATHLETES = [

  { id: "a-cs3", first: "Diego", last: "Ramirez", school: "Crystal Springs", grade: 11, gender: "M", email: "diego.r@email.com", phone: "555-0103" },
  { id: "a-cs4", first: "Lucas", last: "Kim", school: "Crystal Springs", grade: 11, gender: "M", email: "lucas.kim@email.com", phone: "555-0104" },
  { id: "a-cs5", first: "Aiden", last: "Park", school: "Crystal Springs", grade: 10, gender: "M", email: "aiden.park@email.com", phone: "555-0105" },
  { id: "a-ph1", first: "Caleb", last: "Brooks", school: "Pine Hills", grade: 12, gender: "M", email: "caleb.b@email.com", phone: "555-0201" },
  { id: "a-ph2", first: "Owen", last: "Garcia", school: "Pine Hills", grade: 12, gender: "M", email: "owen.g@email.com", phone: "555-0202" },
  { id: "a-ph3", first: "Ethan", last: "Lee", school: "Pine Hills", grade: 11, gender: "M", email: "ethan.lee@email.com", phone: "555-0203" },
  { id: "a-rv1", first: "Isaiah", last: "Thomas", school: "Riverside", grade: 12, gender: "M", email: "isaiah.t@email.com", phone: "555-0301" },
  { id: "a-rv2", first: "Carlos", last: "Mendoza", school: "Riverside", grade: 11, gender: "M", email: "carlos.m@email.com", phone: "555-0302" },
  { id: "a-wv1", first: "Andre", last: "Dubois", school: "Westview", grade: 12, gender: "M", email: "andre.d@email.com", phone: "555-0401" },
  { id: "a-wv2", first: "Maxwell", last: "Tran", school: "Westview", grade: 12, gender: "M", email: "max.tran@email.com", phone: "555-0402" },
  { id: "a-ng1", first: "Cameron", last: "Bryant", school: "Northgate", grade: 12, gender: "M", email: "cameron.b@email.com", phone: "555-0501" },
  { id: "a-ef1", first: "Phoenix", last: "Walker", school: "Eastfield", grade: 12, gender: "M", email: "phoenix.w@email.com", phone: "555-0601" },
];

function defaultEntries() {
  const entries = [];
  SEED_SCHOOLS.forEach((school) => {
    const schoolAthletes = SEED_ATHLETES.filter(a => a.school === school);
    schoolAthletes.forEach((a) => {
      entries.push({ athleteId: a.id, bib: null }); // Bibs start empty
    });
  });
  return entries;
}

function syntheticResults(seed = 1) {
  let rng = seed;
  function rand() { rng = (rng * 9301 + 49297) % 233280; return rng / 233280; }
  const finishers = SEED_ATHLETES
    .map(a => ({ athleteId: a.id, time: 950 + (rand() - 0.5) * 120 }))
    .sort((a, b) => a.time - b.time);
  return finishers.map((f, i) => ({ ...f, place: i + 1 }));
}

const SEED_MEETS = [
  {
    id: "preseason-2026",
    name: "Pre-Season Opener",
    date: "2026-08-22",
    location: "Riverside Park",
    course: "Riverside (3.0 mi)",
    distance: "5K",
    gender: "M",
    entries: defaultEntries(),
    raceStartedAt: null,
    endedAt: 1,
    timerTaps: [],
    recorderBibs: [],
    finalResults: syntheticResults(7),
  },
  {
    id: "csi-2026",
    name: "Crystal Springs Invitational",
    date: "2026-09-12",
    location: "Crystal Springs HS",
    course: "Crystal Springs",
    distance: "5K",
    gender: "M",
    entries: defaultEntries(),
    raceStartedAt: null,
    endedAt: null,
    timerTaps: [],
    recorderBibs: [],
    finalResults: null,
  },
];

//=================================================================
// STATE + SYNC
//=================================================================
const CHANNEL_NAME = "xc-race-timing-demo-v3";
const STORAGE_KEY = "xc-race-timing-demo-v3";
const channel = new BroadcastChannel(CHANNEL_NAME);

function defaultState() {
  return {
    schools: [...SEED_SCHOOLS],
    athletes: SEED_ATHLETES.map(a => ({...a})),
    meets: SEED_MEETS.map(m => ({...m, entries: m.entries.map(e => ({...e}))})),
    activeMeetId: "csi-2026",
  };
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return { ...defaultState(), ...parsed };
  } catch { return defaultState(); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function getMeet(id) { return state.meets.find(m => m.id === id); }
function getActiveMeet() { return getMeet(state.activeMeetId); }

function applyEvent(ev) {
  const m = ev.meetId ? getMeet(ev.meetId) : getActiveMeet();
  switch (ev.type) {
    case "MEET_CREATE":
      state.meets.push(ev.meet);
      state.activeMeetId = ev.meet.id;
      break;
    case "MEET_UPDATE":
      Object.assign(getMeet(ev.id), ev.fields);
      break;
    case "MEET_DELETE":
      state.meets = state.meets.filter(x => x.id !== ev.id);
      if (state.activeMeetId === ev.id) state.activeMeetId = state.meets[0]?.id || null;
      break;
    case "MEET_SET_ACTIVE":
      state.activeMeetId = ev.id;
      break;
    case "RACE_START":
      if (m) { m.raceStartedAt = ev.startedAt; m.endedAt = null; m.timerTaps = []; m.recorderBibs = []; m.finalResults = null; state.activeMeetId = m.id; }
      break;
    case "RACE_END":
      if (m) {
        m.endedAt = ev.endedAt;
        m.finalResults = computeFinalResults(m);
      }
      break;
    case "RACE_RESET":
      if (m) { m.raceStartedAt = null; m.endedAt = null; m.timerTaps = []; m.recorderBibs = []; m.finalResults = null; }
      break;
    case "TIMER_TAP":
      if (m && m.raceStartedAt && !m.endedAt) m.timerTaps.push({ position: m.timerTaps.length + 1, ms: ev.ms });
      break;
    case "TIMER_UNDO":
      if (m) m.timerTaps.pop();
      break;
    case "RECORDER_BIB":
      if (m && m.raceStartedAt && !m.endedAt) m.recorderBibs.push({ position: m.recorderBibs.length + 1, bib: ev.bib });
      break;
    case "RECORDER_UNDO":
      if (m) m.recorderBibs.pop();
      break;
    case "ATHLETE_ADD":
      state.athletes.push(ev.athlete);
      if (!state.schools.includes(ev.athlete.school)) state.schools.push(ev.athlete.school);
      break;
    case "ATHLETE_REMOVE":
      state.athletes = state.athletes.filter(a => a.id !== ev.id);
      state.meets.forEach(meet => meet.entries = meet.entries.filter(e => e.athleteId !== ev.id));
      break;
    case "SCHOOL_ADD":
      if (!state.schools.includes(ev.name)) state.schools.push(ev.name);
      break;
    case "SCHOOL_REMOVE":
      state.schools = state.schools.filter(s => s !== ev.name);
      state.athletes = state.athletes.filter(a => a.school !== ev.name);
      state.meets.forEach(meet => meet.entries = meet.entries.filter(e => state.athletes.find(a => a.id === e.athleteId)));
      break;
    case "ENTRY_TOGGLE":
      if (m) {
        const i = m.entries.findIndex(e => e.athleteId === ev.athleteId);
        if (i >= 0) m.entries.splice(i, 1);
        else m.entries.push({ athleteId: ev.athleteId, bib: null });
      }
      break;
    case "BIBS_ASSIGN_BY_LASTNAME":
      if (m) {
        // Sort athletes by last name, assign 0000, 0001, 0002...
        const sortedAthletes = state.athletes
          .filter(a => m.entries.some(e => e.athleteId === a.id))
          .sort((a, b) => a.last.localeCompare(b.last));
        
        m.entries.forEach(e => e.bib = null);
        
        sortedAthletes.forEach((ath, index) => {
          const entry = m.entries.find(e => e.athleteId === ath.id);
          if (entry) {
            entry.bib = String(index).padStart(4, '0');
          }
        });
      }
      break;
    case "BIBS_CLEAR":
      if (m) m.entries.forEach(e => e.bib = null);
      break;
    case "FULL_RESET":
      state = defaultState();
      break;
  }
}

function broadcast(ev) { 
  applyEvent(ev); 
  saveState(); 
  channel.postMessage(ev); 
  render(); 
  pushToSupabase(ev);  // Also push to Supabase for cross-phone sync
}
channel.addEventListener("message", (e) => { applyEvent(e.data); saveState(); render(); });
window.addEventListener("storage", (e) => { if (e.key === STORAGE_KEY) { state = loadState(); render(); } });

//=================================================================
// HELPERS
//=================================================================
function fmtTime(sec) {
  if (sec == null) return "—";
  if (sec < 0) sec = 0;
  const m = Math.floor(sec / 60);
  const s = (sec - m * 60).toFixed(1);
  return `${m}:${s.padStart(4, "0")}`;
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function elapsed(meet) {
  if (!meet || !meet.raceStartedAt) return 0;
  const end = meet.endedAt && meet.endedAt > 1 ? meet.endedAt : Date.now();
  return (end - meet.raceStartedAt) / 1000;
}
function findAthleteByBibInMeet(bib, meet) {
  if (bib == null || !meet) return null;
  const entry = meet.entries.find(e => e.bib === bib);
  if (!entry) return null;
  return state.athletes.find(a => a.id === entry.athleteId);
}
function athletePr(athlete) {
  let best = 99999;
  state.meets.forEach(meet => {
    if (!meet.finalResults) return;
    meet.finalResults.forEach(r => {
      if (r.athleteId === athlete.id && r.time < best) best = r.time;
    });
  });
  return best < 99999 ? best : null;
}
function getMeetStatus(meet) {
  if (meet.finalResults || meet.endedAt) return "done";
  if (meet.raceStartedAt) return "live";
  return "upcoming";
}
function computeFinalResults(meet) {
  const results = [];
  for (let i = 0; i < meet.recorderBibs.length; i++) {
    const tap = meet.timerTaps[i];
    const bibEntry = meet.recorderBibs[i];
    if (!tap || bibEntry.bib == null) continue;
    const ath = findAthleteByBibInMeet(bibEntry.bib, meet);
    if (!ath) continue;
    results.push({ athleteId: ath.id, time: tap.ms / 1000, place: results.length + 1 });
  }
  return results;
}
function makeId(prefix = "x") { return prefix + "-" + Math.random().toString(36).slice(2, 9); }

//=================================================================
// ROUTING
//=================================================================
function getRoute() {
  const h = location.hash.replace("#", "");
  const parts = h.split("/").filter(Boolean);
  if (parts.length === 0) return { name: "coach-default" };
  if (parts[0] === "picker") return { name: "picker" };
  if (parts[0] === "timer") return { name: "timer" };
  if (parts[0] === "recorder") return { name: "recorder" };
  if (parts[0] === "meets") return { name: "meets" };
  if (parts[0] === "athletes") return { name: "athletes" };
  if (parts[0] === "meet" && parts[1]) {
    return { name: "meet", meetId: parts[1], tab: parts[2] || autoMeetTab(getMeet(parts[1])) };
  }
  return { name: "coach-default" };
}
function autoMeetTab(meet) {
  if (!meet) return "entry";
  if (meet.endedAt || meet.finalResults) return "results";
  if (meet.raceStartedAt) return "race";
  return "entry";
}
function go(hash) { location.hash = hash; render(); }
function setRole(r) { go(r ? "#" + r : ""); }
function setMeetTab(meetId, tab) { go(`#meet/${meetId}/${tab}`); }

//=================================================================
// RENDER
//=================================================================
const app = document.getElementById("app");
const modalRoot = document.getElementById("modal-root");

function render() {
  const route = getRoute();
  modalRoot.innerHTML = "";
  if (route.name === "picker") return renderPicker();
  if (route.name === "timer") return renderTimer();
  if (route.name === "recorder") return renderRecorder();
  if (route.name === "athletes") return renderCoachShell("athletes");
  if (route.name === "meets") return renderCoachShell("meets");
  if (route.name === "meet") {
    state.activeMeetId = route.meetId;
    return renderCoachShell("meet", route.tab);
  }
  const active = getActiveMeet();
  if (active) return renderCoachShell("meet", autoMeetTab(active));
  return renderCoachShell("meets");
}
window.addEventListener("hashchange", render);

setInterval(() => {
  const route = getRoute();
  const activeMeet = getActiveMeet();
  if (activeMeet && activeMeet.raceStartedAt && !activeMeet.endedAt) {
    const liveTimeEl = document.getElementById("live-time");
    if (liveTimeEl) liveTimeEl.textContent = fmtTime(elapsed(activeMeet));
    const clockBigEl = document.getElementById("clock-big");
    if (clockBigEl) clockBigEl.textContent = fmtTime(elapsed(activeMeet));
  }
}, 100);

//=================================================================
// PICKER
//=================================================================
function renderPicker() {
  app.className = "app";
  app.innerHTML = `
    <div class="picker">

      <div class="role-grid">

          <div class="role-card-desc">Default app view. Manage meets, enter athletes, run races, share results. Athletes persist across meets and accumulate a season history.</div>
        </button>
        <button class="role-card timer" onclick="setRole('timer')">

        </button>
      </div>
      <div class="picker-instructions">
        <b>How to test the demo</b>
        Open this file in two or three browser windows or on different phones. Pick roles and use the new <b>Cloud Sync</b> card above to connect all devices to the same Supabase project for real-time sync.
      </div>
      <div class="picker-bottom">
        <button onclick="if(confirm('Reset everything (entries, meets, race data)?')) broadcast({type:'FULL_RESET'})">Full reset</button>
      </div>
    </div>
  `;
}

function openSupabaseSetup() {
  modalRoot.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this) closeModal()">
      <div class="modal">

        <div style="font-size:13px; color:var(--text-muted); margin-bottom:16px; line-height:1.5;">

          <b>Multi-phone sync is active.</b><br>

initSupabase();

async function subscribeToSupabase() {
  if (!supabaseClient || !supabaseConnected) return;
  
  try {
    const channel = supabaseClient
      .channel('race-sync')
      .on('postgres_changes', 
        { event: 'INSERT', schema: 'public', table: 'race_events' },
        (payload) => {
          const ev = payload.new.payload;
          if (ev && ev.type) {
            console.log("[Supabase] Received remote event:", ev.type);
            // Apply the event locally (this will trigger render)
            applyEvent(ev);
            saveState();
            render();
          }
        }
      )
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          console.log("[Supabase] Realtime subscription active - multi-phone sync enabled!");
        }
      });
  } catch (e) {
    console.warn("[Supabase] Subscription failed (create 'race_events' table in Supabase):", e.message);
  }
}

async function pushToSupabase(event) {
  if (!supabaseClient || !supabaseConnected) return;
  
  try {
    const { error } = await supabaseClient
      .from('race_events')
      .insert({
        meet_id: event.meetId || state.activeMeetId,
        type: event.type,
        payload: event,
        created_at: new Date().toISOString()
      });
    
    if (error) {
      console.warn("[Supabase] Insert error (table may not exist yet):", error.message);
    } else {
      console.log("[Supabase] Event pushed:", event.type);
    }
  } catch (e) {
    console.warn("[Supabase] Push failed:", e.message);
  }
}

  const meet = getMeet(meetId);
  const schoolAthletes = state.athletes.filter(a => a.school === school && (!meet.gender || meet.gender === 'all' || a.gender === meet.gender));

function renderRace(meet) {
  const elapsedNow = elapsed(meet);
  const totalPositions = Math.max(meet.timerTaps.length, meet.recorderBibs.length);
  const completed = meet.recorderBibs.filter((b, i) => b.bib != null && meet.timerTaps[i]).length;
  const drift = meet.timerTaps.length - meet.recorderBibs.length;
  const hasEntries = meet.entries.some(e => e.bib != null);

  return `
    <div class="action-grid" style="grid-template-columns: 1fr 1fr;">
      ${!meet.raceStartedAt ? `
        ${hasEntries ? `
          <button class="action-btn success" onclick="broadcast({type:'RACE_START', meetId:'${meet.id}', startedAt: Date.now()})" style="font-size: 15px; padding: 14px;">START GUN</button>
          <button class="action-btn warn" onclick="runSimulator()">Run simulator</button>
        ` : `
          <div style="grid-column: span 2; padding: 12px; background: var(--warning-bg); color: var(--warning); border-radius: 8px; font-size: 12px; text-align: center;">
            Add athletes and assign bibs in Meet Entry first.
          </div>
        `}
      ` : !meet.endedAt ? `
        <button class="action-btn danger" onclick="if(confirm('End the race? Times stop now.')) broadcast({type:'RACE_END', meetId:'${meet.id}', endedAt: Date.now()})" style="font-size: 15px; padding: 14px;">STOP RACE</button>
        <button class="action-btn" onclick="if(confirm('Reset race data?')) broadcast({type:'RACE_RESET', meetId:'${meet.id}'})">Reset race</button>
      ` : `
        <button class="action-btn" onclick="if(confirm('Reset race data? Entries stay.')) broadcast({type:'RACE_RESET', meetId:'${meet.id}'})">Reset race</button>
        <button class="action-btn primary" onclick="setMeetTab('${meet.id}','results')">View results →</button>
      `}
    </div>

    <div class="stat-row">
      <div class="stat-card warn"><div class="stat-l">Times</div><div class="stat-v">${meet.timerTaps.length}</div></div>
      <div class="stat-card primary"><div class="stat-l">Bibs</div><div class="stat-v">${meet.recorderBibs.length}</div></div>
      <div class="stat-card success"><div class="stat-l">Matched</div><div class="stat-v">${completed}</div></div>
    </div>

    ${meet.raceStartedAt && !meet.endedAt ? `
      <div class="clock-card">
        <div class="clock-card-l">Race time</div>
        <div class="clock-card-v" id="clock-big">${fmtTime(elapsedNow)}</div>
        <div class="clock-card-r">${drift === 0 ? "Streams in sync" : drift > 0 ? `Recorder ${drift} behind` : `Recorder ${Math.abs(drift)} ahead`}</div>
      </div>
    ` : ""}

    ${totalPositions > 0 ? `
      <div class="section-label">Live position table</div>
      <div class="position-table">
        <div class="position-row-d head">
          <div>#</div><div>Time</div><div>Bib · Athlete</div><div style="text-align:right;">PR</div>
        </div>
        ${Array.from({length: totalPositions}, (_, i) => {
          const tap = meet.timerTaps[i];
          const bibEntry = meet.recorderBibs[i];
          const ath = bibEntry && bibEntry.bib != null ? findAthleteByBibInMeet(bibEntry.bib, meet) : null;
          const isMatched = tap && bibEntry && bibEntry.bib != null;
          const pr = ath && tap ? (tap.ms / 1000 < (athletePr(ath) || 99999) ? "★" : "") : "";
          return `
            <div class="position-row-d ${isMatched ? "" : "unmatched"}">
              <div class="pos-num">${i + 1}</div>
              <div class="col-time">${tap ? fmtTime(tap.ms / 1000) : '<span class="empty-cell">no time</span>'}</div>
              <div>
                <div class="col-bib">${bibEntry == null ? '<span class="empty-cell">no bib</span>' : (bibEntry.bib == null ? '<span class="empty-cell">skipped</span>' : `${bibEntry.bib}`)}</div>
                ${ath ? `<div class="col-name">${ath.first} ${ath.last} · ${ath.school}</div>` : ""}
              </div>
              <div style="text-align: right; font-weight: 600; color: var(--warning);">${pr}</div>
            </div>
          `;
        }).join("")}
      </div>
    ` : `
      <div class="empty-state">
        ${meet.raceStartedAt ? "Waiting for the first finisher" : meet.finalResults ? "Race already completed — see Results" : "Tap START GUN above to begin"}
      </div>
    `}
  `;
}

// RESULTS VIEW (unchanged from original, with team scoring)
//=================================================================
let resultsFilter = "all";
function setResultsFilter(s) { resultsFilter = s; render(); }

function renderResults(meet) {
  const allFinishers = meet.finalResults
    ? meet.finalResults.map(r => {
        const a = state.athletes.find(x => x.id === r.athleteId);
        const entry = meet.entries.find(e => e.athleteId === r.athleteId);
        return { overallPos: r.place, time: r.time, ...(a || { first: "Unknown", last: "", school: "?", grade: "?" }), bib: entry ? entry.bib : null };
      })
    : (() => {
        const out = [];
        for (let i = 0; i < meet.recorderBibs.length; i++) {
          const tap = meet.timerTaps[i];
          const bibEntry = meet.recorderBibs[i];
          if (!tap || bibEntry.bib == null) continue;
          const ath = findAthleteByBibInMeet(bibEntry.bib, meet);
          if (!ath) continue;
          out.push({ overallPos: out.length + 1, time: tap.ms / 1000, ...ath, bib: bibEntry.bib });
        }
        return out;
      })();

  if (allFinishers.length === 0) {
    return `<div class="empty-state">No results yet. Run a race first.</div>`;
  }

  // Team scoring with tiebreakers
  const bySchool = {};
  allFinishers.forEach(f => {
    if (!bySchool[f.school]) bySchool[f.school] = [];
    bySchool[f.school].push(f);
  });
  const eligibleSchools = Object.keys(bySchool).filter(s => bySchool[s].length >= 5);
  const ntsSchools = Object.keys(bySchool).filter(s => bySchool[s].length < 5);
  const scored = allFinishers
    .filter(f => eligibleSchools.includes(f.school))
    .map((f, i) => ({ ...f, scoringPos: i + 1 }));
  const teamScores = eligibleSchools.map(school => {
    const teamRunners = scored.filter(f => f.school === school);
    const top5 = teamRunners.slice(0, 5);
    const disp = teamRunners.slice(5, 7);
    const points = top5.reduce((sum, f) => sum + f.scoringPos, 0);
    const sixth = disp[0] ? disp[0].scoringPos : null;
    return { school, points, top5, disp, sixth };
  }).sort((a, b) => a.points - b.points || (a.sixth ?? 999) - (b.sixth ?? 999));

  const allSchoolsFilter = ['all', ...state.schools];
  const filteredFinishers = resultsFilter === 'all' ? allFinishers : allFinishers.filter(f => f.school === resultsFilter);

  const publicUrl = `https://racetime.app/m/${meet.id}`;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(publicUrl)}`;

  return `
    <div class="share-section">
      <div class="qr-box"><img src="${qrUrl}" alt="QR code for public results" /></div>
      <div class="share-info">
        <div class="share-l">Public results</div>
        <div class="share-url">${publicUrl}</div>
        <div class="share-actions">
          <button class="share-btn" onclick="copyToClipboard('${publicUrl}')">Copy link</button>
          <button class="share-btn primary" onclick="downloadResultsCsv('${meet.id}')">Download spreadsheet</button>
        </div>
      </div>
    </div>

    <div class="results-section">
      <div class="results-h">
        <span>Team scores (Cross Country rules)</span>
        <span class="results-h-sub">top 5 = score · (6, 7) = displacers</span>
      </div>
      ${teamScores.length === 0 ? `
        <div class="empty-state" style="padding: 16px;">No team has 5 finishers yet</div>
      ` : teamScores.map((t, i) => `
        <div class="team-row ${i === 0 ? 'winner' : ''}">
          <div class="team-row-head">
            <div style="display: flex; align-items: baseline; flex: 1; min-width: 0;">
              <span class="team-place ${i === 0 ? 'winner' : ''}">${i + 1}.</span>
              <span class="team-name">${t.school}</span>
            </div>
            <div class="team-pts">${t.points}</div>
          </div>
          <div class="team-places">
            ${t.top5.map(r => `<span class="team-place-pill">${r.scoringPos}</span>`).join('')}
            ${t.disp.map(r => `<span class="team-place-pill disp">(${r.scoringPos})</span>`).join('')}
          </div>
        </div>
      `).join('')}
      ${ntsSchools.map(s => `
        <div class="team-nts">
          <div class="team-nts-l">No team score</div>
          <div class="team-nts-name">${s} — ${bySchool[s].length} finisher${bySchool[s].length === 1 ? '' : 's'} (need 5)</div>
        </div>
      `).join('')}
    </div>

    <div class="results-section">
      <div class="results-h">
        <span>Individual results</span>
        <span class="results-h-sub">${filteredFinishers.length} finishers</span>
      </div>
      <div class="school-filter">
        ${allSchoolsFilter.map(s => `
          <button class="${resultsFilter === s ? 'active' : ''}" onclick="setResultsFilter('${s}')">
            ${s === 'all' ? 'All schools' : s}
          </button>
        `).join('')}
      </div>
      <div class="position-table">
        ${filteredFinishers.map(f => {
          const isPR = f.time <= (athletePr(f) || 99999) + 0.05;
          return `
            <div class="ind-row">
              <div class="ind-pos">${f.overallPos}</div>
              <div class="ind-bib">${f.bib || '—'}</div>
              <div>
                <div class="ind-name">${f.first} ${f.last}</div>
                <div class="ind-school">${f.school} · grade ${f.grade}</div>
              </div>
              <div class="ind-time">${fmtTime(f.time)}</div>
              <div class="ind-pr">${isPR ? '★' : ''}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => alert("Link copied: " + text)).catch(() => prompt("Copy this link:", text));
}

function downloadResultsCsv(meetId) {
  const meet = getMeet(meetId);
  if (!meet) return;
  const finishers = meet.finalResults
    ? meet.finalResults.map(r => {
        const a = state.athletes.find(x => x.id === r.athleteId);
        const entry = meet.entries.find(e => e.athleteId === r.athleteId);
        return { place: r.place, bib: entry?.bib || '', name: `${a?.first || '?'} ${a?.last || ''}`, school: a?.school || '?', grade: a?.grade || '?', gender: a?.gender || '?', time: fmtTime(r.time) };
      })
    : [];
  if (finishers.length === 0) { alert('No finishers to export'); return; }
  const rows = [
    ['Place', 'Bib', 'Name', 'School', 'Grade', 'Gender', 'Time'],
    ...finishers.map(f => [f.place, f.bib, f.name, f.school, f.grade, f.gender, f.time])
  ];
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${meet.id}-results.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function parseRosterText(text, defaultSchool) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return [];
  const delim = lines[0].includes('\t') ? '\t' : ',';
  const split = (line) => line.split(delim).map(c => c.trim().replace(/^"|"$/g, ''));

  const headerKeywords = ['first', 'last', 'grade', 'gender', 'school', 'email', 'phone', 'name'];
  const firstParts = split(lines[0]);
  const hasHeader = firstParts.some(p => headerKeywords.includes(p.toLowerCase()));
  let columnMap = { first: 0, last: 1, grade: 2, gender: 3, school: 4, email: 5, phone: 6 };
  let dataLines = lines;

  if (hasHeader) {
    columnMap = { first: -1, last: -1, grade: -1, gender: -1, school: -1, email: -1, phone: -1 };
    firstParts.forEach((p, i) => {
      const k = p.toLowerCase();
      if (k === 'first' || k === 'firstname') columnMap.first = i;
      else if (k === 'last' || k === 'lastname') columnMap.last = i;
      else if (k === 'grade' || k === 'year' || k === 'class') columnMap.grade = i;
      else if (k === 'gender' || k === 'sex' || k === 'm/f') columnMap.gender = i;
      else if (k === 'school' || k === 'team') columnMap.school = i;
      else if (k === 'email' || k === 'e-mail') columnMap.email = i;
      else if (k === 'phone' || k === 'tel' || k === 'mobile') columnMap.phone = i;
    });
    dataLines = lines.slice(1);
  }

  return dataLines.map(line => {
    const parts = split(line);
    const row = { first: '', last: '', grade: null, gender: 'M', school: defaultSchool || '', email: '', phone: '', valid: false, error: null };
    if (columnMap.first >= 0 && parts[columnMap.first]) row.first = parts[columnMap.first];
    if (columnMap.last >= 0 && parts[columnMap.last]) row.last = parts[columnMap.last];
    if (columnMap.grade >= 0 && parts[columnMap.grade]) {
      const g = Number(parts[columnMap.grade]);
      if (!isNaN(g) && g >= 9 && g <= 12) row.grade = g;
    }
    if (columnMap.gender >= 0 && parts[columnMap.gender]) {
      const g = parts[columnMap.gender].toLowerCase();
      if (g === 'f' || g === 'female' || g === 'girl' || g === 'girls' || g === 'w') row.gender = 'F';
      else row.gender = 'M';
    }
    if (columnMap.school >= 0 && parts[columnMap.school]) row.school = parts[columnMap.school];
    if (columnMap.email >= 0 && parts[columnMap.email]) row.email = parts[columnMap.email];
    if (columnMap.phone >= 0 && parts[columnMap.phone]) row.phone = parts[columnMap.phone];

    if (!row.first || !row.last) row.error = 'Missing first or last name';
    else if (!row.grade) row.error = 'Missing or invalid grade';
    else if (!row.school) row.error = 'No school (pick a default above)';
    else row.valid = true;
    return row;
  });
}

function parseUploadPreview() {
  const text = document.getElementById('ur-text')?.value || '';
  const parsed = parseRosterText(text, uploadDefaultSchool);
  const preview = document.getElementById('upload-preview');
  if (!preview) return;
  if (parsed.length === 0) {
    preview.innerHTML = '';
    document.getElementById('ur-submit').disabled = true;
    return;
  }
  const valid = parsed.filter(p => p.valid);
  const invalid = parsed.length - valid.length;
  document.getElementById('ur-submit').disabled = valid.length === 0;
  preview.innerHTML = `
    <div class="upload-preview">
      <div class="upload-summary">
        <span class="count-ok">${valid.length} valid</span>
        ${invalid > 0 ? `<span class="count-err">${invalid} with issues</span>` : ''}
      </div>
      ${parsed.map(p => `
        <div class="upload-row-p ${p.valid ? '' : 'invalid'}">
          <div class="row-mark ${p.valid ? 'ok' : 'err'}">${p.valid ? '✓' : '!'}</div>
          <div class="row-name">${p.first} ${p.last || '<span style="color: var(--text-faint);">no last</span>'}</div>
          <div style="text-align: center; color: var(--text-muted);">${p.gender || '—'}</div>
          <div style="text-align: center; color: var(--text-muted);">${p.grade || '—'}</div>
          <div style="color: var(--text-muted);">${p.school || (p.error ? `<span class="row-error">${p.error}</span>` : '—')}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function submitUploadRoster(meetId) {
  const text = document.getElementById('ur-text').value;
  const parsed = parseRosterText(text, uploadDefaultSchool).filter(p => p.valid);
  if (parsed.length === 0) { alert('No valid athletes to add'); return; }
  const enterInMeet = meetId && document.getElementById('ur-enter')?.checked;
  let added = 0, skipped = 0, entered = 0;
  const newSchools = new Set();
  parsed.forEach(p => { if (!state.schools.includes(p.school)) newSchools.add(p.school); });
  newSchools.forEach(s => broadcast({ type: 'SCHOOL_ADD', name: s }));
  parsed.forEach(p => {
    const dup = state.athletes.find(a => a.first.toLowerCase() === p.first.toLowerCase() && a.last.toLowerCase() === p.last.toLowerCase() && a.school === p.school);
    if (dup) {
      skipped++;
      if (enterInMeet) {
        const meet = getMeet(meetId);
        if (meet && !meet.entries.some(e => e.athleteId === dup.id)) {
          broadcast({ type: 'ENTRY_TOGGLE', meetId, athleteId: dup.id });
          entered++;
        }
      }
      return;
    }
    const athlete = { id: makeId('a'), first: p.first, last: p.last, school: p.school, grade: p.grade, gender: p.gender, email: p.email, phone: p.phone };
    broadcast({ type: 'ATHLETE_ADD', athlete });
    added++;
    if (enterInMeet) {
      broadcast({ type: 'ENTRY_TOGGLE', meetId, athleteId: athlete.id });
      entered++;
    }
  });
  closeModal();
  alert(`Added ${added} athletes${skipped > 0 ? ` (${skipped} duplicates skipped)` : ''}${entered > 0 ? ` · Entered ${entered} in current meet` : ''}.`);
}

// RECORDER VIEW
//=================================================================
let bibBuffer = "";
function renderRecorder() {
  app.className = "app";
  const meet = getActiveMeet();
  const nextPos = meet ? meet.recorderBibs.length + 1 : 1;
  const matchingTap = meet ? meet.timerTaps[nextPos - 1] : null;
  const drift = meet ? meet.timerTaps.length - meet.recorderBibs.length : 0;

  app.innerHTML = `
    ${chuteTopbar("Recorder", meet)}
    <div class="view">
      ${!meet || !meet.raceStartedAt ? `
        <div style="text-align:center; padding: 40px 20px; color: var(--text-muted); font-size: 14px;">
          Waiting for the director to start a race.
        </div>
      ` : `
        <div class="${drift === 0 ? "drift-bar synced" : "drift-bar drift"}">
          <span><b>${drift === 0 ? "In sync" : drift > 0 ? `${drift} bibs behind` : `${Math.abs(drift)} ahead`}</b> · ${meet.recorderBibs.length} of ${meet.timerTaps.length} matched</span>
          ${drift > 0 ? `<button class="skip-btn" onclick="skipBib()">Skip bib</button>` : ""}
        </div>
        ${matchingTap ? `
          <div class="pending-card">
            <div class="pending-row">
              <div class="pending-pos">Position ${nextPos}</div>
              <div class="pending-time">${fmtTime(matchingTap.ms / 1000)}</div>
            </div>
            <div class="pending-bib-display">
              ${[0,1,2,3].map(i => `<div class="bib-digit ${bibBuffer.length <= i ? "empty" : ""}">${bibBuffer[i] || "_"}</div>`).join("")}
            </div>
            <div class="resolved-name">${
              bibBuffer.length === 4
                ? (findAthleteByBibInMeet(bibBuffer, meet)
                    ? `${findAthleteByBibInMeet(bibBuffer, meet).first} ${findAthleteByBibInMeet(bibBuffer, meet).last} — ${findAthleteByBibInMeet(bibBuffer, meet).school}`
                    : `<span style="color: var(--danger);">Unknown bib ${bibBuffer}</span>`)
                : ""
            }</div>
          </div>
        ` : `
          <div class="pending-empty">Waiting for the next finisher to cross.</div>
        `}
        <div class="keypad">
          ${["1","2","3","4","5","6","7","8","9"].map(d => `
            <button class="key" onclick="addDigit('${d}')" ${!matchingTap || bibBuffer.length >= 4 ? "disabled" : ""}>${d}</button>
          `).join("")}
          <button class="key del" onclick="delDigit()" ${bibBuffer.length === 0 ? "disabled" : ""}>⌫</button>
          <button class="key" onclick="addDigit('0')" ${!matchingTap || bibBuffer.length >= 4 ? "disabled" : ""}>0</button>
          <button class="key commit" onclick="commitBib()" ${bibBuffer.length !== 4 || !matchingTap ? "disabled" : ""}>✓</button>
        </div>
        <button class="undo-btn" onclick="broadcast({type:'RECORDER_UNDO'})" ${meet.recorderBibs.length === 0 ? "disabled" : ""}>
          Undo last bib
        </button>
        ${meet.recorderBibs.length > 0 ? `
          <div class="recent-section">
            <div class="section-label">Recent bibs</div>
            ${meet.recorderBibs.slice(-5).reverse().map(b => {
              const ath = b.bib != null ? findAthleteByBibInMeet(b.bib, meet) : null;
              const tap = meet.timerTaps[b.position - 1];
              return `
                <div class="entry-row">
                  <div class="pos-pill">${b.position}</div>
                  <div style="flex:1; min-width:0;">
                    <div class="entry-name">${b.bib == null ? '<span style="color: var(--text-faint);">— skipped —</span>' : `${b.bib} · ${ath ? ath.first + ' ' + ath.last : "unknown"}`}</div>
                    ${ath ? `<div class="entry-sub">${ath.school}</div>` : ""}
                  </div>
                  <div class="entry-time">${tap ? fmtTime(tap.ms / 1000) : "—"}</div>
                </div>
              `;
            }).join("")}
          </div>
        ` : ""}
      `}
    </div>
  `;
}

function addDigit(d) { if (bibBuffer.length >= 4) return; bibBuffer += d; renderRecorder(); }
function delDigit() { bibBuffer = bibBuffer.slice(0, -1); renderRecorder(); }
function commitBib() { if (bibBuffer.length !== 4) return; const bib = bibBuffer; bibBuffer = ""; broadcast({ type: "RECORDER_BIB", bib }); }
function skipBib() { bibBuffer = ""; broadcast({ type: "RECORDER_BIB", bib: null }); }

//=================================================================
// SHARED CHUTE TOPBAR
//=================================================================
function chuteTopbar(roleName, meet) {
  const liveText = meet && meet.raceStartedAt && !meet.endedAt
    ? `<span class="live-pill"><span class="live-dot"></span>Live</span><div class="live-time" id="live-time">${fmtTime(elapsed(meet))}</div>`
    : meet && meet.endedAt
    ? `<span class="live-pill done"><span class="live-dot"></span>Ended</span><div class="live-time">${fmtTime(elapsed(meet))}</div>`
    : `<span class="live-pill idle"><span class="live-dot"></span>Standby</span>`;
  const roleColor = roleName === "Timer"
    ? 'background: var(--warning-bg); color: var(--warning);'
    : 'background: var(--primary-bg); color: var(--primary);';
  return `
    <div class="topbar">
      <div class="topbar-l">
        <div class="eyebrow">${meet ? meet.location + ' · ' + fmtDate(meet.date) : 'No active meet'}</div>
        <div class="meet-name">${meet ? meet.name : '—'}</div>
        <div class="race-name">${meet ? meet.distance + ' · ' + meet.course : ''}</div>
        <div style="margin-top: 6px; display: flex; gap: 8px; align-items: center;">
          <span style="font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; ${roleColor}">${roleName}</span>
          <span class="switch-link" onclick="setRole('picker')">switch role</span>
        </div>
      </div>
      <div class="topbar-r">${liveText}</div>
    </div>
  `;
}

//=================================================================
// SIMULATOR
//=================================================================
function runSimulator() {
  const meet = getActiveMeet();
  if (!meet) return;
  const racing = meet.entries
    .filter(e => e.bib != null)
    .map(e => ({ entry: e, athlete: state.athletes.find(a => a.id === e.athleteId) }))
    .filter(x => x.athlete);
  if (racing.length === 0) { alert('No athletes have bibs assigned. Use Meet Entry → Assign Bibs by Last Name first.'); return; }
  if (!confirm(`Run simulated race with ${racing.length} athletes? Will compress to ~25 seconds with intentional drift.`)) return;

  broadcast({ type: "RACE_RESET", meetId: meet.id });
  setTimeout(() => {
    broadcast({ type: "RACE_START", meetId: meet.id, startedAt: Date.now() });
    const finishers = racing
      .map(r => ({ ...r, simTime: 950 + (Math.random() - 0.5) * 120 }))
      .sort((a, b) => a.simTime - b.simTime);
    const SCALE = 80;
    finishers.forEach((f, i) => {
      const finishOffsetMs = (f.simTime / SCALE) * 1000;
      setTimeout(() => {
        const m = getActiveMeet();
        if (m && m.raceStartedAt) broadcast({ type: "TIMER_TAP", ms: Date.now() - m.raceStartedAt });
      }, finishOffsetMs);
      const recorderDelay = 600 + Math.random() * 1200;
      const r = Math.random();
      setTimeout(() => {
        const m = getActiveMeet();
        if (!m || !m.raceStartedAt) return;
        if (r < 0.05 && i > 4) broadcast({ type: "RECORDER_BIB", bib: null });
        else broadcast({ type: "RECORDER_BIB", bib: f.entry.bib });
      }, finishOffsetMs + recorderDelay);
    });
    const lastFinishMs = (finishers[finishers.length - 1].simTime / SCALE) * 1000;
    setTimeout(() => {
      const m = getActiveMeet();
      if (m && m.raceStartedAt && !m.endedAt) broadcast({ type: "RACE_END", meetId: m.id, endedAt: Date.now() });
    }, lastFinishMs + 4000);
  }, 50);
}

render();
